server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false   # don't register itself
    fetch-registry: false         # don't fetch registry from itself
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0   # faster startup
    enable-self-preservation: false      # dev mode - don't preserve stale instances

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
