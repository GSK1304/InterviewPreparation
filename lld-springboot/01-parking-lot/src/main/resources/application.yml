server:
  port: 0   # 0 = random dynamic port; Eureka tracks actual port

spring:
  application:
    name: PARKING-LOT

  datasource:
    url: jdbc:h2:mem:parkingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    try-it-out-enabled: true
    # Explicitly point config-url to gateway-relative path so Swagger UI
    # fetches its config through the gateway (port 8080) not the direct port.
    config-url: /api/parking/api-docs/swagger-config
    url: /api/parking/api-docs
    oauth2-redirect-url: http://localhost:8080/api/parking/swagger-ui/oauth2-redirect.html

# Allow Spring to honour X-Forwarded-Prefix sent by the gateway.
# This makes SpringDoc generate server URLs relative to the gateway
# path (/api/parking, /api/splitwise etc.) instead of the service's
# random direct port — so Swagger UI works correctly via localhost:8080.
server:
  forward-headers-strategy: framework

logging:
  level:
    lld: DEBUG
    org.springframework.web: INFO
    org.flywaydb: INFO
